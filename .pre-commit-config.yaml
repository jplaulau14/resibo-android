# T004: pre-commit hooks — block secrets, large files, malformed Kotlin
# Install locally: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ktlint
        name: ktlint
        language: system
        entry: ktlint
        types: [kotlin]
        # Requires: brew install ktlint (or equivalent)
